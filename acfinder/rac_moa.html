<script type="text/plain" id="views_or_tables">
</script>
<!--	タブ専用の script -->
<script>

// 現在選択中の RAC 区分
let currentRac;

async function searchCrop() {
	const title = document.querySelector('#title');
	tables = resetTables(tables);
	if (checkedCrops.length === 0) {
		title.innerHTML = '';
		title.classList.add('hidden');
		return;
	}
	const crops = checkedCrops.map(item => item.sakumotsu); // checkedCrops から作物だけの配列を取り出し
	title.innerHTML = crops.join(',');
	title.classList.remove('hidden');
	const mode = currentRac.toUpperCase().slice(0, 1);
	const expandCropFlags = crops.map(crop => `max(${expandCrops(crop)}) as ${normalizeColName(crop)}`);
	const sqlRac = {
		F: 'sayokiko, sayoten, fgroup as FRACグループ名, keito, ippanmei, tsusho, risk from frac_ai left join frac_sg using(sid) left join frac_mg using(mid)',
		I: 'sayokiko, sayoten, keito, ippanmei, tsusho from irac_ai left join irac_sg using(sid) left join irac_mg using(mid)',
		H: 'lhrac as 旧分類, sayokiko, sayoten, keito, ippanmei, tsusho from hrac_ai left join hrac_sg using(sid) left join hrac_mg using(mid)'
	};
	const sql = `
		with tRac1 as (
			select distinct ippanmei, seibun,
				${expandCropFlags.join(',')},
				re_replace('^(くり|不可欠用途|検疫|.*農地)専用|^(くん蒸|微量注入|粉衣|塗布|緑化|側条|きのこ|わさび|芝|大豆|(家庭)?園芸|(野菜類)?種子消毒)(用)?|^(ヤシマ|NT|エキカ)|粒状(水中)?|固形|強力|防散|撒粉|なげこみ|\(粉状\)', re_replace('((ZY)?-?[0-9]\.?[0-9]*(?![,\-]|号))(グラム|キロ|[GQNSW%]|D(?![FL]))?', tsusho, ''), '') as tsusho,
				if(mid like '%未', '', '['||replace(mid, 'F:', '')||']') as rac
			from kihon as a left join m_tekiyo using(bango) left join m_sakumotsu using(sakumotsu) left join sakuhojo using(idsaku)
			where mid is not null and sakumotsu in (${makeCropCondition(crops)})
			group by tsusho, ippanmei order by tsusho
		), tRac2 as (
			select tsusho, string_agg(rac, '') as tsushoRac from tRac1 group by tsusho
		), tRac3 as (
			select ippanmei, gn_concat(', ', tsusho||replace(replace(tsushoRac, rac, ''), '][', '/')) as tsusho
			from tRac1 left join tRac2 using(tsusho) where ${normalizeColName(crops.join(' and '))}
			group by ippanmei
		)
		select re_replace('^([1-9])(?![0-9])', mid, ' $1') as mid, ${sqlRac[mode]} left join tRac3 using(ippanmei) where tsusho is not null and mid != '未' order by mid;
	`;
	if (debug) console.log(sql);
	await waiting(true, 'データベース検索中');
	try {
		let searchTime = -performance.now();
		let result = db.exec(sql);
		searchTime += performance.now();
		tables = outputTable('#result', result, { caption: `「${crops.join('」「')}」に${crops.length > 1 ? '共通して' : ''}使用可能な薬剤の${currentRac.toUpperCase()}作用機構分類`, hideFooterU20: false });
	} catch (error) {
		console.error(`エラー: ${error.message}`);
	} finally {
		await waiting(false);
	}
}

function handleRacChange(event) {
	currentRac = event.target.value;
	searchCrop();
}

// DOM読込完了時の初期設定
window.addEventListener('DOMContentLoaded', async function() {
	//データベース読込
	if (db === null) await fetchDB();

	// currentRac を RAC 区分セレクタから取得
	currentRac = document.querySelector('#selectRac select').value;

	// 作物ツリーの生成とイベントハンドラ設定
	const sql = `
		select idsaku, class, toroku, sakumotsu, shukakubui, betsumei, 
		':'||replace(n_concat('、', strconv(sakumotsu, 'k'), strconv(betsumei, 'k'), ruby), '、', ':')||':' as keywords
		from m_sakumotsu where sakumotsu not like '%除く%';
	`;
	makeCropTree('#cropTree', sql, searchCrop);

	// firefox のリロード時 checkbox 状態復元対策
	clearAllReset();

});
</script>

<body>
<!--	全タブ共通ヘッダ -->
<div id="loading"></div><!-- loading メッセージ表示領域確保 -->
<div id="title-bar"></div><!--	タイトル表示領域確保 -->
<!--	このタブの表示内容 -->
<div class="tab_content">
	<div class="flex_container">
		<div id="conditionPane">
			<div id="selectRac">
				<h3>RAC区分</h3>
				<select onchange="handleRacChange(event)">
					<option value="frac" selected>FRAC</option>
					<option value="irac">IRAC</option>
					<option value="hrac">HRAC</option>
				</select>
			</div>
			<div id="cropTree"></div>
		</div>
		<div id="resultPane">
			<h3 id="title" class="hidden"></h3>
			<div id="result"></div>
		</div>
	</div>
</div><!-- End of tab-content -->
<!--  タブ内容読込後に実行する script -->
<script>
</script>
