<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/handsontable@16.2.0/styles/handsontable.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/infinite-tree@1.18.0/dist/infinite-tree.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/infinite-tree@1.18.0/dist/infinite-tree.css">
<!-- タブ専用外部ライブラリ -->
<!-- romaji-conv ライブラリ / 作物タブ・病害虫タブ・薬剤タブ -->
<script src="https://cdn.jsdelivr.net/npm/@koozaki/romaji-conv@2.0.32/dist/romaji-conv.js"></script>
<!--	タブ専用スタイル -->
<style>
.selector {
	margin-bottom: 15px;
}

#cropTree {
	height: fit-content
	/* height: Calc(100vh - 131px); */
}

.infinite-tree-scroll {
	min-height: 230px;
	max-height: calc(100vh - 377px);
}

</style>
<!--	タブ専用の view や table の設定 -->
<script type="text/plain" id="views_or_tables">
</script>
<!--	タブ専用の script -->
<script>

let currentListing;

async function searchCrop() {
	const title = document.querySelector('#title');
	tables = resetTables(tables);
	if (checkedCrops.length === 0) {
		title.innerHTML = '';
		title.classList.add('hidden');
		if (excluderChanged) setupCropTree();
		return;
	}
	const crops = checkedCrops.map(item => item.sakumotsu); // checkedCrops から作物だけの配列を取り出し
	title.innerHTML = crops.join(',');
	title.classList.remove('hidden');
	const expandCropFlags = crops.map(crop => `max(${expandCrops(crop)}) as ${normalizeColName(crop)}`);
	let sql =`
		with tTsusho as (
			select tsusho,${expandCropFlags.join(',')}
			from m_tekiyo left join m_kihon using(bango) left join m_sakumotsu using(sakumotsu) left join sakuhojo using(idsaku)
			where sakumotsu in (${makeCropCondition(crops)}) ${excludeCondition} group by tsusho
		),
		tTekiyo as (
			select * from tv_tsushoTekiyo where tsusho in (select tsusho from tTsusho where ${normalizeColName(crops.join(currentSearchMethod))}) and sakumotsu in (${makeCropCondition(crops)})
		)
	`;
	switch(currentListing) {
		case 1: // 使用方法毎に集約
			sql += `
				select 
					tsusho, seizaidokusei, zaikei, seizaiyoto, sakumotsu,
					gn_concat(', ', n_concat('/', byochu, mokuteki)||' '||baisu) as 対象病害虫等,
					count(distinct n_concat('/', byochu, mokuteki)) as 対象病害虫数,
					jiki, kaisu, ekiryo, hoho, basho, jikan, ondo, dojo, chitai, tekiyaku,
					seibun1, kaisu1, mid1, keito1, rem1, risk1,
					seibun2, kaisu2, mid2, keito2, rem2, risk2,
					seibun3, kaisu3, mid3, keito3, rem3, risk3,
					seibun4, kaisu4, mid4, keito4, rem4, risk4,
					seibun5, kaisu5, mid5, keito5, rem5, risk5,
					shurui, kongo, seizaikoka
				from tTekiyo
				group by tsusho, sakumotsu, kaisu, jiki, hoho, ekiryo, basho, jikan, ondo, chitai, tekiyaku
				order by seizaiyoto, tsusho;
			`;
			break;
		case 2: // 防除記録様式
			sql += `
				select
					seizaiyoto, sakumotsu, tsusho, seizaidokusei, jiki,
					gn_concat(', ', n_concat('/', byochu, mokuteki)||' '||baisu) as 対象病害虫等,
					count(distinct n_concat('/', byochu, mokuteki)) as 対象病害虫数,
					kaisu, ' ' as 使用日1,
					iif(extnum('回', kaisu, 10) < 2, '*', ' ') as 使用日2,
					iif(extnum('回', kaisu, 10) < 3, '*', ' ') as 使用日3,
					iif(extnum('回', kaisu, 10) < 4, '*', ' ') as 使用日4,
					iif(extnum('回', kaisu, 10) < 5, '*', ' ') as 使用日5,
					iif(extnum('回', kaisu, 10) < 6, '*', ' ') as 使用日6,
					iif(extnum('回', kaisu, 10) < 7, '*', ' ') as 使用日7,
					iif(extnum('回', kaisu, 10) < 8, '*', ' ') as 使用日8,
					hoho,	max(ekiryo) as ekiryo,
					seibun1, kaisu1, mid1, keito1, rem1, risk1,
					seibun2, kaisu2, mid2, keito2, rem2, risk2,
					seibun3, kaisu3, mid3, keito3, rem3, risk3,
					seibun4, kaisu4, mid4, keito4, rem4, risk4,
					seibun5, kaisu5, mid5, keito5, rem5, risk5,
					shurui, kongo, zaikei, seizaikoka
				from tTekiyo
				group by sakumotsu, tsusho, kaisu, jiki, hoho, basho, jikan, ondo, chitai, tekiyaku
				order by seizaiyoto, tsusho;
			`;
			break;
		default: // 標準(集約無し)
			sql += 'select * from tTekiyo;';
	}
	if (debug) console.log(sql);
	await waiting(true, 'データベース検索中');
	try {
		let searchTime = -performance.now();
		let result = db.exec(sql);
		searchTime += performance.now();
		const common = currentSearchMethod === ' and ' ? '共通して' : '';
		tables = outputTable('#result', result, { caption: `「${crops.join('」「')}」に${common}使用可能な薬剤の適用`, hideFooterU20: false });
	} catch (error) {
		console.error(`エラー: ${error.message}`);
	} finally {
		await waiting(false);
	}
}

function handleListingChange(event) {
	currentListing = parseInt(event.target.value);
	if (tables) searchCrop();
}

function handleSearchMethodChange(event) {
	currentSearchMethod = event.target.value;
	if (tables) searchCrop();
}

// DOM読込完了時の初期設定
window.addEventListener('DOMContentLoaded', async function() {
	//データベース読込
	if (db === null) await fetchDB();

	// currentListing を表示形式セレクタから取得
	currentListing = parseInt(document.getElementById('listing').value);

	// currentSearchMethod を表示形式セレクタから取得
	currentSearchMethod = document.getElementById('searchMethod').value;

	// 除外薬剤セレクタの生成とイベントハンドラ設定
	makeExcludeSelector();

	// 作物ツリーの生成とイベントハンドラ設定
	setupCropTree();

	// firefox のリロード時 checkbox 状態復元対策
	clearAllReset();

});
</script>
</head>
<body>
<!--	全タブ共通ヘッダ -->
<div id="loading"></div><!-- loading メッセージ表示領域確保 -->
<div id="title-bar"></div><!--	タイトル表示領域確保 -->
<!--	このタブの表示内容 -->
<div class="tab_content">
	<div class="flex_container">
		<div id="conditionPane">
			<div id="excluder"></div>
			<div class="selector">
				<h3>表示形式</h3>
				<select id="listing" onchange="handleListingChange(event)">
					<option value="0" selected>標準(集約無し)</option>
					<option value="1">病害虫・希釈倍数を集約</option>
					<option value="2">防除記録様式</option>
				</select>
			</div>
			<div class="selector">
				<h3>複数作物選択時検索方法</h3>
				<select id="searchMethod" onchange="handleSearchMethodChange(event)">
					<option value=" or " selected>OR検索</option>
					<option value=" and ">AND検索</option>
				</select>
			</div>
			<div id="cropTree"></div>
		</div>
		<div id="resultPane">
			<h3 id="title" class="hidden"></h3>
			<div id="result"></div>
		</div>
	</div>
</div><!-- End of tab-content -->
<!--  タブ内容読込後に実行する script -->
<script>
</script>
</body>
</html>
