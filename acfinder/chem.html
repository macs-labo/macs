<!--	タブ専用の script -->
<script>
//薬剤候補リスト作成 optGroup 版 
function setYakuzaiList(yakuzaiInput) {
	// 入力キーワードをノーマライズ
	const rawKeyword = yakuzaiInput.value;
	// 全角記号を半角に、スペース類を半角スペースに統一し、連続するスペースを1つにまとめる
	const normalizedInput = rawKeyword.replace(/[｜，,]/g, '|').replace(/[　＆&]/g, ' ').replace(/\s+/g, ' ').trim();

	// まず半角スペースでAND条件のグループに分割
	const andGroups = normalizedInput.split(' ').filter(group => group.length > 0);

	// 各ANDグループを処理して、最終的な検索キーワード配列を作成
	const chems = andGroups.map(group => {
		// グループ内を'|'でOR条件の単語に分割
		const orWords = group.split('|').filter(word => word.length > 0);

		// 各OR単語を処理し、ひらがな変換を追加
		const processedOrWords = orWords.flatMap(word => {
			const patterns = [word];
			if (/^[a-z\-]+$/i.test(word)) {
				const hiragana = romajiConv(word).toHiragana();
				if (hiragana && hiragana !== word) patterns.push(hiragana);
			}
			return patterns;
		});
		// OR条件を'|'で再結合
		return processedOrWords.join('|');
	});
	//console.log(chems);
	const chemConditions = chems.map(chem => { return `(kws regexp '${chem}' or cast(bango as text) regexp '^(${chem})$')`; });
	const whereCondition = chemConditions.length > 0 ? chemConditions.join(' and ') : '1=1';
	let sql = `
		select distinct tsusho, bango, meisho from kihon left join tsushoruby using(tsusho) left join kwlists using(bango)
		where ${whereCondition} order by ruby;
	`;

	const sqlResult = db.exec(sql);

	// Create a select options
	const listBox = document.getElementById("yakuzaiListbox");
	listBox.innerHTML = ""; // Clear previous options

	// Check if sqlResult has data
	if (sqlResult && sqlResult[0] && sqlResult[0].values && sqlResult[0].values.length > 0) {
		// Group results by tsusho
		let groups = new Map();
		sqlResult[0].values.forEach(row => {
			const tsusho = row[0] || '';
			const bango = row[1] || '';
			const meisho = row[2] || '';
			if (!groups.has(tsusho)) {
				groups.set(tsusho, []);
			}
			groups.get(tsusho).push({ bango: bango, meisho: meisho });
		});

		// Iterate through groups to create list items
		groups.forEach((items, tsusho) => {
			if (tsusho) {
				const optgroupLabel = document.createElement("div");
				optgroupLabel.className = "yakuzaiGroup";
				optgroupLabel.textContent = tsusho;
				listBox.appendChild(optgroupLabel);
			}
			items.forEach(item => {
				const option = document.createElement("div");
				option.className = "yakuzaiOption";
				option.dataset.bango = item.bango; // Store bango as data attribute
				option.textContent = `${item.bango} ${item.meisho}`; // Display as two columns with space
				option.title = option.textContent; // Mouse over hint text
				listBox.appendChild(option);
			});
		});
	} else {
		const option = document.createElement("option");
		option.text = "No results found";
		option.disabled = true;
		listBox.appendChild(option);
	}
	// #selectYakuzai を表示
	const selectYakuzai = document.getElementById("selectYakuzai");
	selectYakuzai.classList.remove("hidden");;

	// 選択肢が1つしかない場合は自動的にクリックイベントを発火
	const options = listBox.querySelectorAll('.yakuzaiOption');
	if (options.length === 1) {
		options[0].click();
	}
}

// Function to return bango on selectBox selection (change event)
function handleYakuzaiSelection(event) {
	const bango = event.target.value;
	//console.log("Selected bango:", bango);

	const selectedOption = event.target.selectedOptions[0];
	const selectedText = selectedOption.text;
	const parts = selectedText.split(' ', 2);
	const meisho = parts[1] || '';

	const display = document.getElementById("selectedValue");

	//return selectedBango; // Returns the bango value
	if (bango) {
		display.textContent = `${bango} ${meisho}`;
		display.classList.remove("hidden");
		// caption と sql 設定
		const sqls = [
			{ caption: '剤の概要', query: `
					SELECT bango,shurui,dokusei AS seizaidokusei,torokubi,ryakusho,zaikei,yoto AS seizaiyoto, ojas AS seizaiojas
					FROM m_kihon AS a LEFT JOIN seizai USING(bango) LEFT JOIN t_tokusai USING(bango) WHERE bango = '${bango}'
			`},
			{ caption: '', query: `
				SELECT chuijiko from suisan WHERE bango = '${bango}'
			`},
			{ caption: '有効成分一覧', query: `
				SELECT
					ippanmei, seibun, iso, nodo, dokusei, jogai, yoto, koka, keito,
					mid, rackeito, sayoten, sayokiko, fgroup, risk, ojas
				FROM kihon WHERE bango = '${bango}'
			`},
			{ caption: `「${bango} ${meisho}」の適用`, query: `
				select * from tv_meishoTekiyo where bango = '${bango}'
			`}
		];
		executeSQLsetGrid(sqls);

	} else {
		display.textContent = "";
	}
}

// sql 実行 結果グリッド作成
async function executeSQLsetGrid(sqls) {
	// テーブルインスタンスをクリア
	tables = resetTables(tables);

	// クエリを逐次実行
	for (const [index, sql] of sqls.entries()) {
		await waiting(true, `クエリ ${index + 1} 実行中`);
		try {
			let searchTime = -performance.now();
			let result = db.exec(sql.query);
			searchTime += performance.now();

			if (!result || result.length === 0) continue;

			// 結果を表示
			let option = { caption: sql.caption };
			if (sql.caption.endsWith('適用')) option.hideFooterU20 = false;
			const columns = result[0].columns;
			if (columns.length == 1 && columns[0] == 'chuijiko') {
				const value = result[0].values[0][0];
				result[0].values[0][0] = value.replaceAll(/#/g, "\n");
			}
			const table = outputTable('#result', result, option);
			if (table) tables.push(table);
		} catch (error) {
			console.error(`クエリ${index + 1} エラー: ${error.message}`);
		}
	}
	await waiting(false);
}

// DOM読込完了時の初期設定
window.addEventListener('DOMContentLoaded', async function() {
	//データベース読込
	if (db === null) await fetchDB();
	
	// タブ内容読込後に実行する scrip は、この下に書いても OK
	// 薬剤候補トリガー登録
	const yakuzaiForm = document.querySelector('#yakuzaiForm');
	const yakuzaiInput = document.querySelector('#yakuzaiInput');
	const yakuzaiButton = document.querySelector('#yakuzaiButton');
	const yakuzaiSelection = document.querySelector('#yakuzaiListbox');

	// submitイベントはオートコンプリートの履歴保存のためにのみ使用し、ページの再読み込みを防ぐ
	yakuzaiForm.addEventListener('submit', (event) => {
		event.preventDefault();
	});
	// ボタンクリックで検索を実行
	yakuzaiButton.addEventListener('click', () => {
		setYakuzaiList(yakuzaiInput);
	});
	// 入力確定時に検索を実行
	yakuzaiInput.addEventListener('change', () => {
		setYakuzaiList(yakuzaiInput);
	});
	// 空白入力時に selectYakuzai と resultPane を非表示にする
	yakuzaiInput.addEventListener('input', () => {
		if (yakuzaiInput.value.trim() === '') {
			document.getElementById("selectYakuzai").classList.add("hidden");
			document.getElementById("result").innerHTML = '';
			document.getElementById("selectedValue").classList.add("hidden");
		}
	});

	// 薬剤選択リストのイベントリスナー
	document.getElementById("selectYakuzai").addEventListener("click", (event) => {
		if (event.target && event.target.classList.contains("yakuzaiOption")) {
			// 選択状態をクリア
			document.querySelectorAll(".yakuzaiOption.selected").forEach(el => {
				el.classList.remove("selected");
			});
			// 選択されたオプションを強調表示
			event.target.classList.add("selected");

			// 選択された薬剤の番号を取得
			const bango = event.target.dataset.bango;

			// 選択処理を実行
			handleYakuzaiSelection({ target: { value: bango, selectedOptions: [{ text: event.target.textContent }] } });
		}
	});

	// URLパラメータからkeywordを取得して自動検索
	const urlParams = new URLSearchParams(window.location.search);
	const keyword = urlParams.get('keyword');
	if (keyword) {
		yakuzaiInput.value = keyword;
		setYakuzaiList(yakuzaiInput); // 検索を実行
	}

});

</script>
