name: Sync MACS

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # 前の処理を中断せず、順番に実行させる

on:
  push:
    paths:
      - 'macs/macs.zip' # ZIPの更新を監視
  workflow_dispatch:
    inputs:
      run_mode:
        description: '実行モード'
        type: choice
        options:
          - 'full_sync'
          - 'github_only'
          - 'site_sync_only'
        default: 'full_sync'
      force_update:
        description: '強制更新（?update=1）しますか？'
        type: boolean
        default: false

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process ZIP and Update Repository
        if: |
          github.event_name == 'push' || 
          github.event.inputs.run_mode == 'full_sync' || 
          github.event.inputs.run_mode == 'github_only'
        run: |
          cd macs
          if [ -f "macs.zip" ]; then
            unzip -o "macs.zip" -d ./
            cd ..
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add .
            
            # 差分がある場合のみ処理
            if ! git diff --cached --quiet; then
              git commit -m "Auto sync macs source [skip ci]"
              # push前に最新の状態を取得して繋ぎ直す
              git pull --rebase origin ${{ github.ref_name }}
              git push
            fi
          fi

      - name: Trigger Remote Sync
        # Push時、または手動で full_sync か site_sync_only を選択した時のみ実行
        if: |
          github.event_name == 'push' ||
          github.event.inputs.run_mode == 'full_sync' ||
          github.event.inputs.run_mode == 'site_sync_only'
        run: |
          # push 時、または run_mode が 'full_sync' の場合 GitHub CDN の反映待ち
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.run_mode }}" == "full_sync" ]]; then
            echo "Waiting 120 seconds for GitHub to reflect changes..."
            sleep 120
          fi
          OPT=$([[ "${{ github.event.inputs.force_update }}" == "true" ]] && echo "?update=1" || echo "")
          CURL_OPTS=(-s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" -H "X-GitHub-Token: ${{ secrets.GITHUB_TOKEN }}")
          
          # 各拠点の .sync.macs.php を叩く
          curl "${CURL_OPTS[@]}" "https://macs.kabe.info/macs/.sync.macs.php${OPT}"
          curl "${CURL_OPTS[@]}" "https://noyaku.ebb.jp/macs/.sync.macs.php${OPT}"
          curl "${CURL_OPTS[@]}" "https://macs.coresv.net/macs/.sync.macs.php${OPT}"
