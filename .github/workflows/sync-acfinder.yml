name: Sync ACFinderBE

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # 前の処理を中断せず、順番に実行させる

on:
  push:
    paths:
      - 'acfinder/acfinder[0-9]*.zip' # acfinder2026.0306.1200.zip 等の追加で発動
  workflow_dispatch:
    inputs:
      run_mode:
        description: '実行モード'
        type: choice
        options:
          - 'full_sync'  # ZIP展開 ＋ サーバー同期
          - 'github_only'  # ZIP展開 ＋ リポジトリ更新のみ
          - 'site_sync_only'    # サーバー同期のみ
        default: 'full_sync'
      force_update:
        description: '実験室を強制更新（?update=1）しますか？'
        type: boolean
        default: false

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process ZIP and Update Repository
        # Push時、または手動で full_sync か github_only を選択した時のみ実行
        if: |
          github.event_name == 'push' || 
          github.event.inputs.run_mode == 'full_sync' || 
          github.event.inputs.run_mode == 'github_only'
        run: |
          cd acfinder
          # アルファベット順で一番最後（最新日付）のZIPを特定
          TARGET_ZIP=$(ls -1 acfinder[0-9]*.zip | tail -n 1)
          
          if [ -z "$TARGET_ZIP" ]; then
            echo "Error: ZIP file not found!"
            exit 1
          fi

          echo "Latest ZIP found: $TARGET_ZIP"
          
          # ZIPを解凍してリポジトリを展開
          unzip -o "$TARGET_ZIP" -d ./
          
          # GitHubにコミット
          cd ..
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .

          # 差分がある場合のみコミットとプル、プッシュを実行
          if ! git diff --cached --quiet; then
            git commit -m "Auto deploy from $TARGET_ZIP [skip ci]"
            
            # pushの直前に最新のリモートの状態を取り込んで整列させる
            git pull --rebase origin ${{ github.ref_name }}
            
            git push
          fi

      - name: Trigger Remote Sync
        # Push時、または手動で full_sync か site_sync_only を選択した時のみ実行
        if: |
          github.event_name == 'push' ||
          github.event.inputs.run_mode == 'full_sync' ||
          github.event.inputs.run_mode == 'site_sync_only'
        run: |
          # GitHub CDN の反映待ち
          # push 時、または run_mode が 'full_sync' の場合のみ待機
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.run_mode }}" == "full_sync" ]]; then
            echo "Waiting 120 seconds for GitHub to reflect changes..."
            sleep 120
          fi

          # 強制更新オプションの判定
          OPT=""
          if [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            OPT="?update=1"
          fi

          echo "Triggering sync with option: $OPT"

          CURL_OPTS=(
            -s 
            -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" 
            -H "X-GitHub-Token: ${{ secrets.GITHUB_TOKEN }}"
          )

          # 各拠点を叩く
          curl "${CURL_OPTS[@]}" "https://macs.xii.jp/acfinder/.sync.acfinder.php$OPT"
          curl "${CURL_OPTS[@]}" "https://macs.kabe.info/acfinder/.sync.acfinder.php$OPT"
          curl "${CURL_OPTS[@]}" "https://noyaku.ebb.jp/acfinder/.sync.acfinder.php$OPT"
          curl "${CURL_OPTS[@]}" "https://macs.coresv.net/acfinder/.sync.acfinder.php$OPT"
